<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#003d8f">
<title>Plantilla WhatsApp · PintorApp</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--azul:#003d8f;--azul2:#002060;--amarillo:#f5c800;--verde:#25D366;--bg:#f0f4f8;--card:#fff;--texto:#1a2340;--muted:#64748b;--border:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh}
.header{background:linear-gradient(135deg,var(--azul2),var(--azul));padding:20px 16px 32px;text-align:center;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:var(--bg);border-radius:50% 50% 0 0/100% 100% 0 0}
.hlogo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.hicon{width:42px;height:42px;background:var(--amarillo);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.htit{font-size:22px;font-weight:900;color:#fff}
.htit span{color:var(--amarillo)}
.hsub{font-size:12px;color:rgba(255,255,255,0.6);font-weight:600}
.tabs{display:flex;gap:8px;padding:28px 16px 0;max-width:500px;margin:0 auto}
.tab{flex:1;padding:11px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif}
.tab.active{background:var(--azul);color:#fff;border-color:var(--azul)}
.nwrap{padding:14px 16px 0;max-width:500px;margin:0 auto}
.nlabel{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
.ninp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;color:var(--texto);background:var(--card);outline:none}
.ninp:focus{border-color:var(--azul)}
.msgs{padding:14px 16px;max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.mcard{background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(0,61,143,.07);overflow:hidden;border-left:4px solid var(--azul)}
.mcard.wa{border-left-color:var(--verde)}
.mcard.fu{border-left-color:var(--amarillo)}
.mhead{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.mlabel{font-size:11px;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:.8px}
.mcard.wa .mlabel{color:var(--verde)}
.mcard.fu .mlabel{color:#b45309}
.mtag{font-size:11px;color:var(--muted);font-weight:600;background:var(--bg);padding:3px 8px;border-radius:20px}
.mbody{padding:0 14px 12px;font-size:14px;line-height:1.65;color:var(--texto);white-space:pre-wrap;word-break:break-word}
.mnota{margin:0 14px 10px;font-size:12px;color:var(--muted);font-style:italic;background:#f8fafc;padding:8px 10px;border-radius:8px}
.mlink{margin:0 14px 10px;background:#eff6ff;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--azul);font-weight:700;word-break:break-all}
.bcopy{width:calc(100% - 28px);margin:0 14px 14px;padding:11px;border:2px solid var(--border);border-radius:10px;background:var(--bg);color:var(--texto);font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.bcopy.ok{background:#dcfce7;border-color:#86efac;color:#166534}
.regla{max-width:500px;margin:0 auto 32px;padding:0 16px}
.regla-in{background:#fef3c7;border-radius:12px;padding:12px 14px;font-size:13px;color:#92400e;font-weight:700}
</style>
</head>
<body>
<div class="header">
  <div class="hlogo">
    <div class="hicon">🎨</div>
    <div class="htit">Pintor<span>App</span></div>
  </div>
  <div class="hsub">Plantilla captación WhatsApp · Unidos por Gran Canaria</div>
</div>

<div class="tabs">
  <button class="tab active" id="tp" onclick="setTab('pintor')">🖌 Pintores</button>
  <button class="tab" id="tm" onclick="setTab('partido')">🏛 Militantes</button>
</div>

<div class="nwrap">
  <label class="nlabel">Nombre del destinatario</label>
  <input class="ninp" id="nombre" type="text" placeholder="Carlos, Paco, Marta..." oninput="render()" autocapitalize="words">
</div>

<div class="msgs" id="msgs"></div>

<div class="regla">
  <div class="regla-in">⚠️ Regla de oro: solo UN seguimiento. Si no contesta en 24h, no insistas.</div>
</div>

<script>
var tab = 'pintor';
var BASE = 'https://bufeteimpagosojuridicos-byte.github.io/-unidos-pintor-app/presentacion-pintorapp.html';

function setTab(t) {
  tab = t;
  document.getElementById('tp').className = 'tab' + (t === 'pintor' ? ' active' : '');
  document.getElementById('tm').className = 'tab' + (t === 'partido' ? ' active' : '');
  render();
}

function getMsgs(n, t) {
  var link = BASE + '?nombre=' + encodeURIComponent(n);
  if (t === 'pintor') {
    return [
      { c:'', l:'Mensaje 1 — Presentación', tag:'Enviar primero', es_link:false,
        txt:'Hola ' + n + ' 👋 Te mando algo que creo que te va a interesar.\n\nEs una app gratuita para pintores — haces presupuestos profesionales en 2 minutos desde el móvil, con voz, carta de colores NCS y RAL, y los mandas por WhatsApp al cliente.\n\nTe la manda *Unidos por Gran Canaria* para apoyar a los profesionales de la isla 🇨🇦' },
      { c:'wa', l:'A continuación — Enlace', tag:'Sin texto adicional', es_link:true,
        nota:'📎 Pega este enlace como mensaje aparte, sin texto. Déjalo hablar solo.',
        link: link },
      { c:'', l:'Mensaje 2 — Si responde positivamente', tag:'Solo si responde', es_link:false,
        txt:'Me alegra que te guste 😊 Mira todo lo que hace la app 👇\n\n' + link + '\n\nPídeme el código de acceso y en 5 minutos la tienes instalada en tu móvil 📲 Sin compromiso, solo para que lo veas 😊' },
      { c:'fu', l:'Mensaje 3 — Seguimiento (24h)', tag:'Una sola vez', es_link:false,
        txt:'Hola ' + n + ', ¿pudiste ver la app? 😊 Sin ningún compromiso, solo quería enseñarte lo que hemos preparado para los pintores de Gran Canaria. Cualquier duda me dices 👋' }
    ];
  } else {
    return [
      { c:'', l:'Mensaje 1 — Para militantes', tag:'Enviar primero', es_link:false,
        txt:'Hola ' + n + ' 👋 Mira lo que ha preparado *Unidos por Gran Canaria* para los pintores de Gáldar.\n\nUna app profesional para hacer presupuestos desde el móvil — con carta de colores, voz, PDF y WhatsApp. Completamente gratis para quien tenga el código de acceso 🇨🇦' },
      { c:'wa', l:'A continuación — Enlace', tag:'Sin texto adicional', es_link:true,
        nota:'📎 Pega este enlace como mensaje aparte, sin texto. Déjalo hablar solo.',
        link: link },
      { c:'', l:'Mensaje 2 — Si muestra interés', tag:'Solo si responde', es_link:false,
        txt:'Es una forma concreta de apoyar a los autónomos de la isla 💪\n\nSi conoces algún pintor al que le pueda venir bien, pásamelo y le mando su código de acceso gratis 👇\n\n' + link + '\n\n¡Seguro que le impresiona! 😊' },
      { c:'fu', l:'Mensaje 3 — Seguimiento (24h)', tag:'Una sola vez', es_link:false,
        txt:'Hola ' + n + ', ¿pudiste ver la presentación? 😊 Si conoces pintores en Gáldar o alrededores, cuéntame y les gestiono el acceso gratuito. Cualquier duda me dices 👋' }
    ];
  }
}

function render() {
  var n = document.getElementById('nombre').value.trim() || '[NOMBRE]';
  var msgs = getMsgs(n, tab);
  var cont = document.getElementById('msgs');
  cont.innerHTML = '';
  msgs.forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'mcard' + (m.c ? ' ' + m.c : '');
    var head = document.createElement('div');
    head.className = 'mhead';
    head.innerHTML = '<span class="mlabel">' + m.l + '</span><span class="mtag">' + m.tag + '</span>';
    card.appendChild(head);
    var btn = document.createElement('button');
    btn.className = 'bcopy';
    if (m.es_link) {
      var nota = document.createElement('div');
      nota.className = 'mnota';
      nota.textContent = m.nota;
      card.appendChild(nota);
      var ld = document.createElement('div');
      ld.className = 'mlink';
      ld.textContent = '🔗 ' + m.link;
      card.appendChild(ld);
      btn.textContent = '📋 Copiar enlace';
      var txt = m.link;
      btn.addEventListener('click', function() { copiar(btn, txt); });
    } else {
      var body = document.createElement('div');
      body.className = 'mbody';
      body.textContent = m.txt;
      card.appendChild(body);
      btn.textContent = '📋 Copiar mensaje';
      var txt = m.txt;
      btn.addEventListener('click', function() { copiar(btn, txt); });
    }
    card.appendChild(btn);
    cont.appendChild(card);
  });
}

function copiar(btn, txt) {
  var orig = btn.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() {
      btn.textContent = '✅ Copiado';
      btn.classList.add('ok');
      setTimeout(function() { btn.textContent = orig; btn.classList.remove('ok'); }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.cssText = 'position:fixed;top:0;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ Copiado';
    btn.classList.add('ok');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('ok'); }, 2000);
  }
}

render();
</script>
</body>
</html>
